<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Информатика 10 класс — 10 вариантов</title>
  <style>
    :root {
      --bg:#f7f7f5;
      --card:#ffffff;
      --text:#1d1d1f;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#111827;
      --accent-soft:#f3f4f6;
      --ok:#166534;
      --bad:#991b1b;
      --warn:#92400e;
      --radius:18px;
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      margin:0;
      font-family:Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.55;
    }
    .shell { max-width:980px; margin:0 auto; padding:0 18px; }
    header { padding:34px 0 18px; }
    .topbar {
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      border-bottom:1px solid var(--line);
      padding-bottom:22px;
    }
    h1 { margin:0; font-size:clamp(24px,4vw,38px); letter-spacing:-.04em; line-height:1.05; }
    .lead { max-width:650px; margin:10px 0 0; color:var(--muted); font-size:15px; }
    .badge {
      display:inline-flex;
      gap:6px;
      align-items:center;
      background:var(--accent-soft);
      border:1px solid var(--line);
      border-radius:999px;
      padding:8px 12px;
      color:#374151;
      font-size:13px;
      white-space:nowrap;
    }
    main { padding-bottom:42px; }
    .controls {
      position:sticky;
      top:0;
      z-index:5;
      margin:8px 0 18px;
      background:rgba(247,247,245,.86);
      backdrop-filter:blur(12px);
      border-bottom:1px solid var(--line);
      padding:12px 0;
    }
    .panel {
      display:grid;
      grid-template-columns:1.3fr .65fr auto auto;
      gap:10px;
      align-items:end;
    }
    label { display:block; font-size:12px; color:var(--muted); margin:0 0 6px; }
    input[type="text"], select {
      width:100%;
      min-height:44px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:15px;
      background:#fff;
      color:var(--text);
      outline:none;
      transition:border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus, select:focus { border-color:#9ca3af; box-shadow:0 0 0 4px rgba(17,24,39,.06); }
    button {
      min-height:44px;
      border:1px solid var(--accent);
      border-radius:12px;
      padding:10px 15px;
      background:var(--accent);
      color:#fff;
      font-size:14px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:transform .12s, opacity .12s, background .12s;
    }
    button:hover { transform:translateY(-1px); }
    button:disabled { opacity:.45; cursor:not-allowed; transform:none; }
    button.secondary { background:#fff; color:var(--accent); border-color:var(--line); }
    .tools { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .note { margin:10px 0 0; color:var(--muted); font-size:13px; }
    .result {
      display:none;
      background:#fff;
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      margin:16px 0;
    }
    .result.show { display:block; }
    .score { margin:4px 0; font-size:34px; line-height:1; font-weight:800; letter-spacing:-.04em; }
    .progress { height:8px; background:#f3f4f6; border-radius:999px; overflow:hidden; margin-top:12px; }
    .progress span { display:block; height:100%; width:0%; background:#111827; border-radius:999px; transition:width .25s ease; }
    .task-list { display:grid; gap:12px; }
    .task {
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:18px;
      box-shadow:0 1px 0 rgba(17,24,39,.02);
    }
    .task-head { display:flex; justify-content:space-between; gap:14px; align-items:flex-start; margin-bottom:12px; }
    .task-title { margin:0; font-size:17px; line-height:1.25; letter-spacing:-.01em; }
    .num { color:var(--muted); font-weight:600; margin-right:6px; }
    .points { color:var(--muted); font-size:12px; white-space:nowrap; background:#f9fafb; border:1px solid var(--line); padding:4px 8px; border-radius:999px; }
    .task-body p { margin:9px 0; }
    .question {
      margin-top:12px!important;
      padding:10px 12px;
      border-left:3px solid var(--accent);
      background:#fafafa;
      border-radius:0 12px 12px 0;
      color:#111827;
    }
    .formula {
      display:inline-block;
      margin:8px 0;
      padding:8px 10px;
      background:#fafafa;
      border:1px solid var(--line);
      border-radius:12px;
      font-family:"Times New Roman", serif;
      font-size:18px;
    }
    pre.algorithm {
      margin:10px 0;
      padding:12px;
      white-space:pre-wrap;
      background:#fafafa;
      border:1px solid var(--line);
      border-radius:12px;
      font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size:13px;
      line-height:1.45;
    }
    .table-wrap { overflow-x:auto; margin:10px 0; }
    table.truth, table.answers-table { border-collapse:separate; border-spacing:0; background:#fff; min-width:420px; border:1px solid var(--line); border-radius:14px; overflow:hidden; }
    table.truth th, table.truth td, table.answers-table th, table.answers-table td { border-right:1px solid var(--line); border-bottom:1px solid var(--line); padding:8px 14px; text-align:center; min-width:54px; }
    table.truth th:last-child, table.truth td:last-child, table.answers-table th:last-child, table.answers-table td:last-child { border-right:0; }
    table.truth tr:last-child td, table.answers-table tr:last-child td { border-bottom:0; }
    table.truth th, table.answers-table th { background:#f9fafb; font-weight:650; }
    .answer-area { margin-top:14px; display:grid; grid-template-columns:minmax(180px, 360px) auto; gap:10px; align-items:center; }
    .answer-area input { background:#fff; }
    .feedback { display:none; margin-top:12px; padding:10px 12px; border-radius:12px; font-size:14px; }
    .task.checked .feedback { display:block; }
    .task.correct { border-color:#bbf7d0; }
    .task.correct .feedback { background:#f0fdf4; color:var(--ok); }
    .task.incorrect { border-color:#fecaca; }
    .task.incorrect .feedback { background:#fef2f2; color:var(--bad); }
    .key-box { display:none; margin:12px 0 0; padding:14px; background:#fff; border:1px dashed #cbd5e1; border-radius:16px; }
    .key-box.show { display:block; }
    .key-grid { columns:2 280px; column-gap:24px; }
    .key-row { break-inside:avoid; display:flex; justify-content:space-between; gap:14px; border-bottom:1px solid #f3f4f6; padding:5px 0; font-size:14px; }
    .hidden { display:none!important; }
    code.inline { background:#f3f4f6; border:1px solid #e5e7eb; border-radius:6px; padding:1px 5px; }
    @media (max-width:840px) {
      .topbar { display:block; }
      .badge { margin-top:14px; }
      .panel { grid-template-columns:1fr; }
      .answer-area { grid-template-columns:1fr; }
      .controls { position:static; }
    }
    @media print {
      body { background:#fff; }
      header { padding-top:10px; }
      .controls, .result, .feedback, .key-box { display:none!important; }
      .task { break-inside:avoid; box-shadow:none; }
      .answer-area { min-height:58px; border-top:1px solid var(--line); padding-top:12px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="shell topbar">
      <div>
        <h1>Проверочная работа по информатике</h1>
        <p class="lead">10 вариантов для 10 класса. В каждом варианте 12 заданий по 1 баллу. Максимум — 12 баллов.</p>
      </div>
      <div class="badge">Минималистичный режим</div>
    </div>
  </header>

  <main class="shell">
    <section class="controls" aria-label="Панель управления">
      <div class="panel">
        <div>
          <label for="studentName">ФИО ученика</label>
          <input id="studentName" type="text" placeholder="Введите имя" autocomplete="off" />
        </div>
        <div>
          <label for="variantSelect">Вариант</label>
          <select id="variantSelect"></select>
        </div>
        <button id="checkBtn" type="button">Проверить</button>
        <button id="resetBtn" type="button" class="secondary">Сбросить</button>
      </div>
      <p class="note">Ответы вводятся без единиц измерения. Для задания с таблицей истинности вводите порядок букв, например <code class="inline">xyzw</code>.</p>
      <div class="tools">
        <button id="reportBtn" type="button" class="secondary" disabled>Скачать отчёт</button>
        <button id="printBtn" type="button" class="secondary">Печать</button>
        <button id="keyBtn" type="button" class="secondary">Ключи учителю</button>
      </div>
      <div id="keyBox" class="key-box"></div>
    </section>

    <section id="result" class="result" aria-live="polite">
      <div id="resultText"></div>
      <div class="progress"><span id="progressBar"></span></div>
    </section>

    <section id="tasks" class="task-list"></section>
  </main>

  <script>
    const variants = [{"id": 1, "title": "Вариант 1", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "16", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>С, О, Л, Н, Ц, Е</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>С — 00, О — 101, Л — 110</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>СОЛНЦЕ</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "12", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 100?</p>", "explain": "При N = 12 получается R = 101."}, {"num": 3, "points": 1, "kind": "single", "answer": "1D", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">1101,1<sub>2</sub> + 17,4<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "64", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>512 на 256</b> пикселей отведено <b>144 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>3 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "xywz", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((z → y) ≡ x) ∨ (w ∧ ¬y)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "53", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>А, Б, В, Г, Д</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. АААА<br>2. АААБ<br>3. АААВ<br>4. АААГ<br>5. АААД\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Б</b> и не содержит двух букв <b>А</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: АВАВ."}, {"num": 7, "points": 1, "kind": "single", "answer": "9", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>172.16.5.137</b> и маской сети <b>255.255.255.192</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "23", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 60, если известно, что p = 5, q = 11, e = 7.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "33", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>512</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>3 075 823</b> серийных номеров требуется не менее <b>1 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "70", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 10 Направо 90 Вперёд 14 Направо 90]\nПоднять хвост\nВперёд 4\nНаправо 90\nВперёд 5\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 9 Направо 90 Вперёд 12 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "27258", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">77x40<sub>12</sub> + 95x56<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "11011011", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-37</b>.</p>"}]}, {"id": 2, "title": "Вариант 2", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "18", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>П, И, Р, А, Т, К</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>П — 10, И — 011, Р — 000</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ПИРАТКА</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "16", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 125?</p>", "explain": "При N = 16 получается R = 132."}, {"num": 3, "points": 1, "kind": "single", "answer": "2C", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">10110,01<sub>2</sub> + 25,6<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "64", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>1024 на 128</b> пикселей отведено <b>128 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>2 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "zwxy", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((y → z) ≡ x) ∨ (w ∧ ¬z)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>0</td><td>1</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "53", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>Е, Ж, З, И, К</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. ЕЕЕЕ<br>2. ЕЕЕЖ<br>3. ЕЕЕЗ<br>4. ЕЕЕИ<br>5. ЕЕЕК\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Ж</b> и не содержит двух букв <b>Е</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: ЕЗЕЗ."}, {"num": 7, "points": 1, "kind": "single", "answer": "27", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>10.8.14.219</b> и маской сети <b>255.255.255.224</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "37", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 80, если известно, что p = 7, q = 11, e = 13.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "33", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>640</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>2 460 658</b> серийных номеров требуется не менее <b>1 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "100", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 12 Направо 90 Вперёд 16 Направо 90]\nПоднять хвост\nВперёд 3\nНаправо 90\nВперёд 7\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 10 Направо 90 Вперёд 11 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "8251", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">159x<sub>12</sub> + 50x10<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "11001010", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-54</b>.</p>"}]}, {"id": 3, "title": "Вариант 3", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "16", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>Г, Р, А, Н, И, Т</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>Г — 01, Р — 100, А — 111</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ГРАНИТ</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "18", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 140?</p>", "explain": "При N = 18 получается R = 149."}, {"num": 3, "points": 1, "kind": "single", "answer": "2A", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">11101,11<sub>2</sub> + 14,2<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "512", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>768 на 512</b> пикселей отведено <b>576 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>3 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "yxwz", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((z → x) ≡ y) ∨ (w ∧ ¬x)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>К, Л, М, Н, О</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. КККК<br>2. КККЛ<br>3. КККМ<br>4. КККН<br>5. КККО\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Н</b> и не содержит двух букв <b>К</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: КЛКЛ."}, {"num": 7, "points": 1, "kind": "single", "answer": "13", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>192.168.45.77</b> и маской сети <b>255.255.255.240</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "55", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 70, если известно, что p = 5, q = 13, e = 7.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "65", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>900</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>5 906 690</b> серийных номеров требуется не менее <b>4 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "88", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 9 Направо 90 Вперёд 18 Направо 90]\nПоднять хвост\nВперёд 2\nНаправо 90\nВперёд 4\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 12 Направо 90 Вперёд 10 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "1266", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">6x30<sub>12</sub> + 300x<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "10110111", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-73</b>.</p>"}]}, {"id": 4, "title": "Вариант 4", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "13", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>М, О, Р, Е, Я, К</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>М — 001, О — 11, Р — 010</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>МОРЯК</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "22", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 170?</p>", "explain": "При N = 22 получается R = 180."}, {"num": 3, "points": 1, "kind": "single", "answer": "41", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">100101,01<sub>2</sub> + 33,6<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "256", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>1024 на 256</b> пикселей отведено <b>352 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>3 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "wzxy", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((x → y) ≡ z) ∨ (w ∧ ¬y)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr><tr><td>0</td><td>0</td><td>1</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>1</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>П, Р, С, Т, У</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. ПППП<br>2. ПППР<br>3. ПППС<br>4. ПППТ<br>5. ПППУ\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Т</b> и не содержит двух букв <b>П</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: ПРПР."}, {"num": 7, "points": 1, "kind": "single", "answer": "4", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети,
