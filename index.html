и 2 [Вперёд 8 Направо 90 Вперёд 13 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "868", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">310x<sub>12</sub> + 354x<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "11101110", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-18</b>.</p>"}]}, {"id": 5, "title": "Вариант 5", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "18", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>В, Е, Т, Р, О, К</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>В — 000, Е — 01, Т — 101</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ВЕТЕРОК</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "25", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 200?</p>", "explain": "При N = 25 получается R = 202."}, {"num": 3, "points": 1, "kind": "single", "answer": "45", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">110011,1<sub>2</sub> + 21,4<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "1024", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>512 на 512</b> пикселей отведено <b>448 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>4 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "xzyw", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((z → w) ≡ x) ∨ (y ∧ ¬w)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>0</td><td>1</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>1</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>0</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>А, В, Е, И, К</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. АААА<br>2. АААВ<br>3. АААЕ<br>4. АААИ<br>5. АААК\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>И</b> и не содержит двух букв <b>А</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: АВАВ."}, {"num": 7, "points": 1, "kind": "single", "answer": "73", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>172.20.33.201</b> и маской сети <b>255.255.255.128</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "77", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 90, если известно, что p = 7, q = 17, e = 5.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "257", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>1500</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>10 815 447</b> серийных номеров требуется не менее <b>16 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "100", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 18 Направо 90 Вперёд 12 Направо 90]\nПоднять хвост\nВперёд 7\nНаправо 90\nВперёд 3\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 9 Направо 90 Вперёд 11 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "10299", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">50x2<sub>12</sub> + 6x591<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "10100000", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-96</b>.</p>"}]}, {"id": 6, "title": "Вариант 6", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "13", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>Ш, К, О, Л, А, Р</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>Ш — 100, К — 00, О — 111</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ШКОЛА</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "28", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 225?</p>", "explain": "При N = 28 получается R = 228."}, {"num": 3, "points": 1, "kind": "single", "answer": "34", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">101011,11<sub>2</sub> + 10,2<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "256", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>1280 на 512</b> пикселей отведено <b>960 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>4 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "wyxz", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((z → y) ≡ w) ∨ (x ∧ ¬y)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>Б, Г, Д, Е, Ж</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. ББББ<br>2. БББГ<br>3. БББД<br>4. БББЕ<br>5. БББЖ\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Е</b> и не содержит двух букв <b>Б</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: БГБГ."}, {"num": 7, "points": 1, "kind": "single", "answer": "22", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>192.168.100.150</b> и маской сети <b>255.255.255.224</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "35", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 140, если известно, что p = 13, q = 17, e = 11.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "513", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>2468</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>1 836 769</b> серийных номеров требуется не менее <b>5 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "99", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 14 Направо 90 Вперёд 15 Направо 90]\nПоднять хвост\nВперёд 6\nНаправо 90\nВперёд 5\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 10 Направо 90 Вперёд 14 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "7690", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">4x217<sub>12</sub> + 88x3<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "11010111", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-41</b>.</p>"}]}, {"id": 7, "title": "Вариант 7", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "10", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>З, И, М, А, С, Н</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>З — 01, И — 100, М — 111</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ЗИМА</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "33", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 260?</p>", "explain": "При N = 33 получается R = 267."}, {"num": 3, "points": 1, "kind": "single", "answer": "62", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">111100,01<sub>2</sub> + 45,6<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "256", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>512 на 384</b> пикселей отведено <b>288 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>4 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "zywx", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((w → z) ≡ y) ∨ (x ∧ ¬z)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>1</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>1</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>З, И, К, Л, М</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. ЗЗЗЗ<br>2. ЗЗЗИ<br>3. ЗЗЗК<br>4. ЗЗЗЛ<br>5. ЗЗЗМ\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Л</b> и не содержит двух букв <b>З</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: ЗИЗИ."}, {"num": 7, "points": 1, "kind": "single", "answer": "30", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>10.10.7.94</b> и маской сети <b>255.255.255.192</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "35", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 80, если известно, что p = 5, q = 17, e = 11.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "65", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>2048</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>2 596 474</b> серийных номеров требуется не менее <b>4 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "100", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 10 Направо 90 Вперёд 22 Направо 90]\nПоднять хвост\nВперёд 1\nНаправо 90\nВперёд 8\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 12 Направо 90 Вперёд 9 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "676", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">39x4<sub>12</sub> + 14x0<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "10000011", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-125</b>.</p>"}]}, {"id": 8, "title": "Вариант 8", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "16", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>Б, Е, Р, Ё, З, А</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>Б — 000, Е — 11, Р — 010</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>БЕРЁЗА</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "38", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 300?</p>", "explain": "При N = 38 получается R = 308."}, {"num": 3, "points": 1, "kind": "single", "answer": "6E", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">1001111,1<sub>2</sub> + 36,4<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "512", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>640 на 512</b> пикселей отведено <b>480 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>3 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "xwzy", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((w → x) ≡ z) ∨ (y ∧ ¬x)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>Н, О, П, Р, С</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. НННН<br>2. НННО<br>3. НННП<br>4. НННР<br>5. НННС\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>С</b> и не содержит двух букв <b>Н</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: НОНО."}, {"num": 7, "points": 1, "kind": "single", "answer": "6", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>172.18.9.246</b> и маской сети <b>255.255.255.240</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "103", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 150, если известно, что p = 11, q = 19, e = 7.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "129", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>3000</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>3 834 792</b> серийных номеров требуется не менее <b>10 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "104", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 16 Направо 90 Вперёд 17 Направо 90]\nПоднять хвост\nВперёд 9\nНаправо 90\nВперёд 2\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 8 Направо 90 Вперёд 12 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "858", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">2x31<sub>12</sub> + 402x<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "11000000", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-64</b>.</p>"}]}, {"id": 9, "title": "Вариант 9", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "13", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>Д, О, М, И, К, С</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>Д — 100, О — 01, М — 111</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ДОМИК</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "43", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 340?</p>", "explain": "При N = 43 получается R = 347."}, {"num": 3, "points": 1, "kind": "single", "answer": "82", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">1101010,11<sub>2</sub> + 27,2<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "256", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>1024 на 512</b> пикселей отведено <b>640 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>2 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "ywzx", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((y → x) ≡ w) ∨ (z ∧ ¬x)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>0</td><td>1</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>1</td><td>1</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>Т, У, Ф, Х, Ц</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. ТТТТ<br>2. ТТТУ<br>3. ТТТФ<br>4. ТТТХ<br>5. ТТТЦ\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Х</b> и не содержит двух букв <b>Т</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: ТУТУ."}, {"num": 7, "points": 1, "kind": "single", "answer": "3", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>192.168.3.131</b> и маской сети <b>255.255.255.248</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "133", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 200, если известно, что p = 17, q = 19, e = 13.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "257", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>512</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>1 980 643</b> серийных номеров требуется не менее <b>1 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "110", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 13 Направо 90 Вперёд 19 Направо 90]\nПоднять хвост\nВперёд 4\nНаправо 90\nВперёд 9\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 9 Направо 90 Вперёд 15 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "1312", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">895x<sub>12</sub> + 110x<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "10100111", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-89</b>.</p>"}]}, {"id": 10, "title": "Вариант 10", "tasks": [{"num": 1, "points": 1, "kind": "single", "answer": "16", "title": "Кодирование. Условие Фано", "body": "<p>По каналу связи передаются сообщения, содержащие только буквы: <b>Ф, Л, А, Г, О, К</b>.</p>\n<p>Для передачи используется двоичный код, удовлетворяющий условию Фано. Кодовые слова для некоторых букв известны: <b>Ф — 000, Л — 01, А — 110</b>.</p>\n<p class=\"question\">Какое наименьшее количество двоичных знаков потребуется для кодирования слова <b>ФЛАГОК</b>?</p>"}, {"num": 2, "points": 1, "kind": "single", "answer": "48", "title": "Анализ алгоритма обработки числа", "body": "<p>Автомат обрабатывает натуральное число <b>N</b> по следующему алгоритму:</p>\n<pre class=\"algorithm\">1. Строится двоичная запись числа N.\n2. Если N чётное, справа приписывается 10, иначе приписывается 01.\n3. Если количество единиц в полученной записи чётное, справа приписывается 0, иначе приписывается 1.\n4. Полученная запись переводится в десятичную систему.</pre>\n<p>В результате работы автомата получается число <b>R</b>.</p>\n<p class=\"question\">Для какого наименьшего натурального числа N значение R будет больше 380?</p>", "explain": "При N = 48 получается R = 389."}, {"num": 3, "points": 1, "kind": "single", "answer": "80", "title": "Системы счисления", "body": "<p>Чему равно значение выражения в системе счисления с основанием 16?</p>\n<div class=\"formula\">1010101,01<sub>2</sub> + 52,6<sub>8</sub></div>\n<p class=\"question\">В ответе укажите только число, основание системы счисления указывать не нужно.</p>"}, {"num": 4, "points": 1, "kind": "single", "answer": "2048", "title": "Кодирование растрового изображения", "body": "<p>Для хранения произвольного растрового изображения размером <b>1024 на 384</b> пикселей отведено <b>720 Кбайт</b> памяти без учёта размера заголовка файла.</p>\n<p>Для кодирования цвета каждого пикселя используется одинаковое количество бит, также используются <b>4 бита</b> для определения степени прозрачности. Коды пикселей записываются в файл один за другим без промежутков.</p>\n<p class=\"question\">Какое максимальное количество цветов, без учёта степени прозрачности, можно использовать в изображении?</p>"}, {"num": 5, "points": 1, "kind": "single", "answer": "zxyw", "title": "Алгебра логики. Таблица истинности", "body": "<p>Логическая функция F задана выражением:</p>\n<div class=\"formula\">F = ((x → w) ≡ y) ∨ (z ∧ ¬w)</div>\n<p>В таблице приведены все строки, при которых F = 0. Столбцы с переменными x, y, z, w перемешаны.</p>\n<div class=\"table-wrap\"><table class=\"truth\"><thead><tr><th>?</th><th>?</th><th>?</th><th>?</th><th>F</th></tr></thead><tbody><tr><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>0</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>0</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>1</td><td>1</td><td>0</td><td>1</td><td>0</td></tr><tr><td>0</td><td>1</td><td>1</td><td>0</td><td>0</td></tr></tbody></table></div>\n<p class=\"question\">Впишите строчные буквы x, y, z, w в том порядке, в котором идут столбцы таблицы слева направо.</p>"}, {"num": 6, "points": 1, "kind": "single", "answer": "27", "title": "Комбинаторика. Слова в алфавитном порядке", "body": "<p>Все четырёхбуквенные слова, в составе которых могут быть только буквы <b>М, О, Р, С, Т</b>, записаны в алфавитном порядке и пронумерованы начиная с 1.</p>\n<pre class=\"algorithm\">1. ММММ<br>2. МММО<br>3. МММР<br>4. МММС<br>5. МММТ\n...</pre>\n<p class=\"question\">Под каким номером в списке идёт первое слово, которое не содержит ни одной буквы <b>Р</b> и не содержит двух букв <b>М</b>, стоящих рядом?</p>", "explain": "Первое подходящее слово: МОМО."}, {"num": 7, "points": 1, "kind": "single", "answer": "31", "title": "Адресация в IP-сетях", "body": "<p>В терминологии сетей TCP/IP маской сети называют двоичное число, которое показывает, какая часть IP-адреса узла сети относится к адресу сети, а какая — к номеру узла в этой сети. Адрес сети и номер узла получаются в результате применения поразрядной конъюнкции к заданному адресу узла и его маске.</p>\n<p>Сеть задана IP-адресом <b>10.24.16.63</b> и маской сети <b>255.255.255.224</b>.</p>\n<p class=\"question\">Определите номер узла в этой сети.</p>"}, {"num": 8, "points": 1, "kind": "single", "answer": "89", "title": "Численный подбор параметра", "body": "<p>В алгоритме шифрования RSA на одном из этапов формирования пары ключей используется формула:</p>\n<div class=\"formula\">(d · e) mod φ(n) = 1</div>\n<p>Значение функции φ(n) вычисляется по формуле <b>φ(n) = (p − 1)(q − 1)</b>.</p>\n<p class=\"question\">Определите наибольшее значение числа d, которое меньше 120, если известно, что p = 7, q = 19, e = 17.</p>"}, {"num": 9, "points": 1, "kind": "single", "answer": "65", "title": "Измерение информации", "body": "<p>На предприятии каждой изготовленной детали присваивают серийный номер  состоящий из <b>2468</b> символов.</p>\n<p>В базе данных каждый серийный номер занимает одинаковое и минимально возможное целое число байт. Используется посимвольное кодирование  все символы кодируются одинаковым и минимально возможным целым числом бит.</p>\n<p>Известно  что для хранения <b>5 385 950</b> серийных номеров требуется не менее <b>10 Гбайт</b> памяти.</p>\n<p class=\"question\">Определите минимально возможную мощность алфавита  используемого для записи серийных номеров.</p>"}, {"num": 10, "points": 1, "kind": "single", "answer": "81", "title": "Исполнитель Черепаха", "body": "<p>Исполнитель Черепаха действует на плоскости с декартовой системой координат. В начальный момент Черепаха находится в начале координат, её голова направлена вдоль положительного направления оси ординат, хвост опущен.</p>\n<p>Черепахе был дан для исполнения следующий алгоритм:</p>\n<pre class=\"algorithm\">Повтори 2 [Вперёд 11 Направо 90 Вперёд 13 Направо 90]\nПоднять хвост\nВперёд 3\nНаправо 90\nВперёд 4\nНалево 90\nОпустить хвост\nПовтори 2 [Вперёд 12 Направо 90 Вперёд 8 Направо 90]</pre>\n<p class=\"question\">Определите количество точек с целочисленными координатами, находящихся внутри пересечения двух фигур, ограниченных заданными алгоритмом линиями, включая точки на линиях.</p>"}, {"num": 11, "points": 1, "kind": "single", "answer": "21323", "title": "Арифметика в системе счисления с основанием 12", "body": "<p>Операнды арифметического выражения записаны в системе счисления с основанием 12:</p>\n<div class=\"formula\">57x54<sub>12</sub> + 78x67<sub>12</sub></div>\n<p>В записи чисел переменной x обозначена неизвестная цифра из алфавита двенадцатеричной системы счисления.</p>\n<p class=\"question\">Определите значение x, при котором значение выражения кратно 13. Для найденного значения x вычислите частное от деления значения выражения на 13 и укажите его в ответе в десятичной системе счисления. Основание системы счисления в ответе указывать не нужно.</p>"}, {"num": 12, "points": 1, "kind": "single", "answer": "11100101", "title": "Представление целых чисел в памяти компьютера", "body": "<p>Для хранения целых чисел со знаком в памяти компьютера может использоваться дополнительный код. Он получается построением обратного кода числа и прибавлением единицы.</p>\n<p class=\"question\">Постройте восьмибитный двоичный дополнительный код к числу <b>-27</b>.</p>"}]}];
    const MAX_SCORE = 12;
    let lastReport = null;

    const variantSelect = document.getElementById('variantSelect');
    const tasksEl = document.getElementById('tasks');
    const resultEl = document.getElementById('result');
    const resultText = document.getElementById('resultText');
    const progressBar = document.getElementById('progressBar');

    function normalize(value) {
      return String(value ?? '').trim().replace(/\s+/g, '').replace(',', '.').toLowerCase();
    }

    function currentVariant() {
      return variants.find(v => String(v.id) === String(variantSelect.value)) || variants[0];
    }

    function renderVariant() {
      const variant = currentVariant();
      tasksEl.innerHTML = variant.tasks.map(task => `
        <article class="task" data-num="${task.num}" data-points="${task.points}">
          <div class="task-head">
            <h2 class="task-title"><span class="num">${task.num}.</span>${task.title}</h2>
            <span class="points">${task.points} балл</span>
          </div>
          <div class="task-body">${task.body}</div>
          <div class="answer-area">
            <input id="answer-${task.num}" type="text" placeholder="Ответ" autocomplete="off" />
            <span class="note">Задание ${task.num}</span>
          </div>
          <div class="feedback"></div>
        </article>
      `).join('');
      resetStateOnly();
    }

    function checkAnswers() {
      const variant = currentVariant();
      let total = 0;
      const rows = [];

      variant.tasks.forEach(task => {
        const card = document.querySelector(`.task[data-num="${task.num}"]`);
        const input = document.getElementById(`answer-${task.num}`);
        const feedback = card.querySelector('.feedback');
        const user = normalize(input.value);
        const correct = normalize(task.answer);
        const isCorrect = user === correct;
        const points = isCorrect ? task.points : 0;
        total += points;

        card.classList.remove('correct', 'incorrect');
        card.classList.add('checked', isCorrect ? 'correct' : 'incorrect');
        feedback.textContent = isCorrect ? `Верно: +${points} балл.` : `Неверно. Правильный ответ: ${task.answer}.`;
        rows.push({ num: task.num, user: input.value.trim(), answer: task.answer, points });
      });

      const percent = Math.round(total / MAX_SCORE * 100);
      resultEl.classList.add('show');
      resultText.innerHTML = `<div class="note">${currentVariant().title}</div><div class="score">${total} / ${MAX_SCORE}</div><div>Результат: ${percent}%</div>`;
      progressBar.style.width = `${percent}%`;
      document.getElementById('reportBtn').disabled = false;

      const name = document.getElementById('studentName').value.trim() || 'Без имени';
      lastReport = makeReport(name, currentVariant().title, total, rows);
      resultEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }

    function makeReport(name, variantTitle, total, rows) {
      const date = new Date().toLocaleString('ru-RU');
      const lines = [
        'Отчёт по проверочной работе по информатике, 10 класс',
        `Дата: ${date}`,
        `Ученик: ${name}`,
        `Вариант: ${variantTitle}`,
        `Итог: ${total} / ${MAX_SCORE}`,
        '',
        'Задание;Ответ ученика;Правильный ответ;Балл',
        ...rows.map(r => `${r.num};${r.user || '-'};${r.answer};${r.points}`)
      ];
      return lines.join('\\n');
    }

    function downloadText(filename, content) {
      const blob = new Blob([content], { type:'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function resetStateOnly() {
      resultEl.classList.remove('show');
      progressBar.style.width = '0%';
      document.getElementById('reportBtn').disabled = true;
      lastReport = null;
      document.getElementById('keyBox').classList.remove('show');
      document.querySelectorAll('.task').forEach(card => {
        card.classList.remove('checked', 'correct', 'incorrect');
        const fb = card.querySelector('.feedback');
        if (fb) fb.textContent = '';
      });
    }

    function resetAll() {
      document.querySelectorAll('.task input[type="text"]').forEach(input => input.value = '');
      resetStateOnly();
    }

    function showKeys() {
      const password = prompt('Введите пароль учителя');
      if (password !== '1430') return;
      const variant = currentVariant();
      const keyBox = document.getElementById('keyBox');
      keyBox.innerHTML = `<b>${variant.title} — ключи</b><div class="key-grid">${variant.tasks.map(t => `<div class="key-row"><span>${t.num}</span><strong>${t.answer}</strong></div>`).join('')}</div>`;
      keyBox.classList.add('show');
    }

    variants.forEach(v => {
      const option = document.createElement('option');
      option.value = v.id;
      option.textContent = v.title;
      variantSelect.appendChild(option);
    });

    variantSelect.addEventListener('change', renderVariant);
    document.getElementById('checkBtn').addEventListener('click', checkAnswers);
    document.getElementById('resetBtn').addEventListener('click', resetAll);
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('keyBtn').addEventListener('click', showKeys);
    document.getElementById('reportBtn').addEventListener('click', () => {
      if (lastReport) downloadText(`report_${currentVariant().id}.txt`, lastReport);
    });

    renderVariant();
  </script>
</body>
</html>
